<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Anotador de Truco</title>
<meta name="description" content="Anotador de puntos para el truco argentino, con fosforitos.">
<meta name="theme-color" content="#143D2B">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
    background: #0D2B1E;
    font-family: Georgia, 'Times New Roman', serif;
    color: #F5EFE0;
    padding: calc(8px + env(safe-area-inset-top)) 12px calc(8px + env(safe-area-inset-bottom));
    user-select: none;
    -webkit-user-select: none;
  }
  .contenedor {
    max-width: 460px; margin: 0 auto;
    height: 100%; min-height: 0;
    display: flex; flex-direction: column;
  }
  header { display: flex; align-items: center; justify-content: space-between; margin-bottom: clamp(4px, 1vh, 10px); flex: 0 0 auto; }
  h1 { margin: 0; font-size: clamp(17px, 2.6vh, 22px); font-weight: 800; letter-spacing: 0.06em; }
  .meta-30 {
    padding: 6px 12px; border-radius: 999px; font-size: 13px; font-weight: 700;
    border: 1px solid rgba(245,239,224,0.35); color: #F5EFE0;
    font-family: system-ui, sans-serif; letter-spacing: 0.04em;
  }
  #btn-icono {
    display: flex; align-items: center; justify-content: center;
    width: 40px; height: 34px; padding: 0; border-radius: 9px;
    border: 1px solid rgba(245,239,224,0.35);
    background: rgba(0,0,0,0.2); cursor: pointer;
  }
  #btn-icono:active { transform: scale(0.92); }
  .fase {
    flex: 0 0 auto; margin-top: 1px;
    font-size: clamp(9px, 1.4vh, 12px); letter-spacing: 0.22em; text-transform: uppercase;
    color: rgba(245,239,224,0.65); font-family: system-ui, sans-serif;
    transition: color 0.2s ease;
  }
  .fase.buenas { color: #E9C893; }
  .tablero { display: flex; gap: 10px; flex: 1 1 auto; min-height: 0; }
  .divisor { width: 1px; background: rgba(245,239,224,0.25); margin: clamp(28px, 7vh, 52px) 0 clamp(36px, 9vh, 70px); }
  .equipo { flex: 1; display: flex; flex-direction: column; align-items: center; min-width: 0; min-height: 0; }
  .equipo input {
    width: 100%; background: transparent; border: none;
    border-bottom: 1px solid rgba(245,239,224,0.25);
    color: #F5EFE0; font-family: Georgia, serif; font-size: clamp(15px, 2.3vh, 20px); font-weight: 700;
    text-align: center; padding: 2px; outline: none; letter-spacing: 0.04em;
    user-select: text; -webkit-user-select: text;
    flex: 0 0 auto;
  }
  .puntaje {
    font-size: clamp(24px, 5vh, 44px); font-weight: 800; line-height: 1.15; margin-top: 2px;
    text-shadow: 0 2px 6px rgba(0,0,0,0.4);
    flex: 0 0 auto;
  }
  .cuadros {
    flex: 1 1 auto; min-height: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: clamp(3px, 0.8vh, 6px);
    width: 100%; margin-top: clamp(2px, 0.8vh, 6px);
  }
  .cuadro {
    flex: 1 1 0; min-height: 0;
    aspect-ratio: 1; width: auto;
    max-width: min(132px, 34vw); max-height: min(132px, 34vw);
    border-radius: 10px; background: rgba(0,0,0,0.22);
    box-shadow: inset 0 1px 4px rgba(0,0,0,0.35); padding: 3px;
  }
  .cuadro svg { width: 100%; height: 100%; display: block; }
  .controles { display: flex; gap: 8px; margin-top: clamp(6px, 1.4vh, 14px); width: 100%; justify-content: center; flex: 0 0 auto; }
  .btn-menos {
    width: clamp(42px, 11vw, 48px); height: clamp(44px, 6.5vh, 56px); border-radius: 12px;
    border: 1px solid rgba(245,239,224,0.3); background: rgba(0,0,0,0.25);
    color: #F5EFE0; font-size: 22px; cursor: pointer;
  }
  .btn-mas {
    flex: 1; max-width: 110px; height: clamp(44px, 6.5vh, 56px); border-radius: 12px; border: none;
    background: #C1440E; color: #FFF6E8; font-size: clamp(20px, 3vh, 24px); font-weight: 800;
    box-shadow: 0 3px 0 #7d2b07; cursor: pointer; font-family: Georgia, serif;
  }
  .btn-mas:active { transform: translateY(2px); box-shadow: 0 1px 0 #7d2b07; }
  button:disabled { opacity: 0.35; cursor: default; }
  .acciones { display: flex; gap: 10px; justify-content: center; margin-top: clamp(6px, 1.4vh, 14px); flex: 0 0 auto; }
  .acciones button {
    padding: clamp(6px, 1.2vh, 10px) 16px; border-radius: 10px; font-size: 13px;
    border: 1px solid rgba(245,239,224,0.35); background: transparent;
    color: #F5EFE0; cursor: pointer; font-family: system-ui, sans-serif;
  }
  .velo {
    position: fixed; inset: 0; background: rgba(10,25,18,0.88);
    display: flex; align-items: center; justify-content: center; z-index: 10; padding: 24px;
  }
  .tarjeta {
    background: #143D2B; border: 1px solid rgba(245,239,224,0.3); border-radius: 18px;
    padding: 32px 28px; text-align: center; max-width: 320px; width: 100%;
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
  }
  .tarjeta .trofeo { font-size: 40px; }
  .tarjeta .titulo { font-size: 26px; font-weight: 800; margin: 10px 0 4px; }
  .tarjeta .marcador { color: rgba(245,239,224,0.6); font-size: 14px; font-family: system-ui, sans-serif; }
  .tarjeta .botones { display: flex; gap: 10px; margin-top: 22px; justify-content: center; }
  .tarjeta .botones .secundario {
    padding: 10px 16px; border-radius: 10px; font-size: 14px;
    border: 1px solid rgba(245,239,224,0.35); background: transparent;
    color: #F5EFE0; cursor: pointer; font-family: system-ui, sans-serif;
  }
  .tarjeta .botones .primario {
    padding: 10px 18px; border-radius: 10px; font-size: 15px; font-weight: 700;
    border: none; background: #C1440E; color: #FFF6E8; cursor: pointer;
    box-shadow: 0 3px 0 #7d2b07;
  }
  /* ---- Fondo de pantalla ---- */
  #capa-fondo {
    position: fixed; inset: 0; z-index: -2;
    background-size: cover; background-position: center; background-repeat: no-repeat;
    transition: opacity 0.45s ease;
  }
  /* Velo oscuro encima de la foto para que los fosforitos y textos se lean siempre */
  #capa-oscura {
    position: fixed; inset: 0; z-index: -1;
    background: linear-gradient(180deg, rgba(13,43,30,0.72) 0%, rgba(13,43,30,0.82) 100%);
  }
  #btn-fondo {
    position: fixed; z-index: 5;
    right: calc(10px + env(safe-area-inset-right));
    bottom: calc(14px + env(safe-area-inset-bottom));
    width: 52px; height: 52px; border-radius: 50%;
    border: 1px solid rgba(245,239,224,0.4);
    background: rgba(13,43,30,0.55); color: #F5EFE0;
    font-size: 24px; line-height: 1; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
    box-shadow: 0 3px 12px rgba(0,0,0,0.4);
  }
  #btn-fondo:active { transform: scale(0.92); }
  #btn-sonido {
    background: transparent; border: none; cursor: pointer;
    font-size: 18px; line-height: 1; padding: 4px 6px; border-radius: 8px;
    opacity: 0.9;
  }
  #btn-sonido:active { transform: scale(0.9); }
  #btn-sonido.silenciado { opacity: 0.45; }
  .oculto { display: none; }
  @keyframes aparecer { from { opacity: 0; transform: scale(1.3); } to { opacity: 1; transform: scale(1); } }
  .nuevo-fosforo { animation: aparecer 0.25s ease-out; transform-origin: center; }
  @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
</style>
</head>
<body>
<audio id="audio-punto" preload="auto">
  <source src="sonidos/punto.m4a" type="audio/mp4">
  <source src="sonidos/punto.mp3" type="audio/mpeg">
</audio>
<div id="capa-fondo"></div>
<div id="capa-oscura"></div>
<button id="btn-fondo" aria-label="Cambiar fondo">→</button>
<div class="contenedor">
  <header>
    <div style="display: flex; align-items: center; gap: 4px;">
      <h1>Truco</h1>
      <button id="btn-sonido" aria-label="Silenciar sonido">🔊</button>
    </div>
    <div style="display: flex; align-items: center; gap: 8px;">
      <button id="btn-icono" aria-label="Cambiar estilo de los puntos"></button>
      <div class="meta-30">a 30</div>
    </div>
  </header>

  <div class="tablero">
    <div class="equipo" id="equipo0">
      <input id="nombre0" maxlength="12" value="Nosotros" aria-label="Nombre del equipo 1">
      <div class="puntaje" id="puntaje0">0</div>
      <div class="fase" id="fase0">malas</div>
      <div class="cuadros" id="cuadros0"></div>
      <div class="controles">
        <button class="btn-menos" id="menos0" aria-label="Restar punto">−</button>
        <button class="btn-mas" id="mas0" aria-label="Sumar punto">+1</button>
      </div>
    </div>
    <div class="divisor"></div>
    <div class="equipo" id="equipo1">
      <input id="nombre1" maxlength="12" value="Ellos" aria-label="Nombre del equipo 2">
      <div class="puntaje" id="puntaje1">0</div>
      <div class="fase" id="fase1">malas</div>
      <div class="cuadros" id="cuadros1"></div>
      <div class="controles">
        <button class="btn-menos" id="menos1" aria-label="Restar punto">−</button>
        <button class="btn-mas" id="mas1" aria-label="Sumar punto">+1</button>
      </div>
    </div>
  </div>

  <div class="acciones">
    <button id="deshacer">↶ Deshacer</button>
    <button id="nueva">Nueva partida</button>
  </div>
</div>

<div class="velo oculto" id="velo">
  <div class="tarjeta">
    <div class="trofeo">🏆</div>
    <div class="titulo" id="tituloGanador"></div>
    <div class="marcador" id="marcadorFinal"></div>
    <div class="botones">
      <button class="secundario" id="corregir">↶ Corregir</button>
      <button class="primario" id="otra">Otra partida</button>
    </div>
  </div>
</div>

<script>
(function () {
  // ===================================================================
  //  FONDOS DE PANTALLA
  //  Para agregar o reemplazar un fondo:
  //   1. Poné la imagen (vertical, idealmente ~900x1600) en la carpeta "fondos/".
  //   2. Sumá su nombre de archivo a esta lista.
  //  El selector toma la lista automáticamente, no hace falta tocar nada más.
  //
  //  Quedan 2 lugares libres para cuando tengas las imágenes de reemplazo:
  //  descomentá las líneas y poné el nombre real del archivo.
  // ===================================================================
  const FONDOS = [
    "fondos/fondo1.jpg",   // barril de cerveza
    "fondos/fondo2.jpg",   // luz violeta
    "fondos/fondo3.jpg",   // sombrero / san lorenzo
    // "fondos/fondo4.jpg",   // <-- reemplazo futuro
    // "fondos/fondo5.jpg",   // <-- reemplazo futuro
  ];

  // ---- Estado ----
  const CLAVE = "anotador-truco-v1";
  let estado = {
    objetivo: 30,
    nombres: ["Nosotros", "Ellos"],
    puntos: [0, 0],
    historial: [],
    fondo: 0,
    silenciado: false,
    icono: "fosforos",
  };

  try {
    const guardado = JSON.parse(localStorage.getItem(CLAVE));
    if (guardado && Array.isArray(guardado.puntos)) estado = Object.assign(estado, guardado);
  } catch (e) { /* estado por defecto */ }
  estado.objetivo = 30; // el juego siempre es a 30, sin excepción

  function guardar() {
    try { localStorage.setItem(CLAVE, JSON.stringify(estado)); } catch (e) { /* sin espacio */ }
  }

  // ---- Fondo de pantalla ----
  const capaFondo = document.getElementById("capa-fondo");
  const btnFondo = document.getElementById("btn-fondo");

  function aplicarFondo() {
    if (FONDOS.length === 0) { capaFondo.style.backgroundImage = "none"; return; }
    if (estado.fondo >= FONDOS.length) estado.fondo = 0;
    // Pre-carga para evitar parpadeo
    const img = new Image();
    img.onload = () => {
      capaFondo.style.opacity = "0";
      setTimeout(() => {
        capaFondo.style.backgroundImage = 'url("' + FONDOS[estado.fondo] + '")';
        capaFondo.style.opacity = "1";
      }, 180);
    };
    img.src = FONDOS[estado.fondo];
  }

  function siguienteFondo() {
    estado.fondo = (estado.fondo + 1) % FONDOS.length;
    aplicarFondo();
    guardar();
  }

  btnFondo.addEventListener("click", siguienteFondo);
  if (FONDOS.length <= 1) btnFondo.classList.add("oculto");
  // Aplicar el fondo guardado al abrir (sin transición la primera vez)
  if (FONDOS.length > 0) {
    capaFondo.style.backgroundImage = 'url("' + FONDOS[estado.fondo % FONDOS.length] + '")';
  }

  // ---- Sonido al sumar punto ----
  const audioPunto = document.getElementById("audio-punto");
  const btnSonido = document.getElementById("btn-sonido");

  function pintarBotonSonido() {
    btnSonido.textContent = estado.silenciado ? "🔇" : "🔊";
    btnSonido.classList.toggle("silenciado", estado.silenciado);
    btnSonido.setAttribute("aria-label", estado.silenciado ? "Activar sonido" : "Silenciar sonido");
  }

  function sonarPunto() {
    if (estado.silenciado) return;
    try {
      audioPunto.currentTime = 0;      // reiniciar por si suena rápido seguido
      audioPunto.play().catch(() => {}); // ignorar si el navegador lo bloquea
    } catch (e) { /* sin audio */ }
  }

  btnSonido.addEventListener("click", () => {
    estado.silenciado = !estado.silenciado;
    pintarBotonSonido();
    guardar();
  });
  pintarBotonSonido();


  // ===================================================================
  //  ESTILOS DE MARCADOR (cómo se dibuja cada punto)
  //  Los 5 trazos forman el clásico cuadrado con diagonal (5 puntos).
  //  Para agregar un estilo nuevo:
  //   1. Escribí una función dibujarXXX(m, anim) que devuelva el SVG de
  //      UN marcador en la posición m (usa m.x1,m.y1,m.x2,m.y2 y la brasa/
  //      cabeza en m.tx,m.ty).
  //   2. Registralo en el objeto ESTILOS y sumá su clave a la lista ICONOS.
  //  El selector del header lo toma automáticamente.
  // ===================================================================
  const POSICIONES = [
    { x1: 10, y1: 10, x2: 10, y2: 58, tx: 10, ty: 12 },
    { x1: 10, y1: 10, x2: 58, y2: 10, tx: 56, ty: 10 },
    { x1: 58, y1: 10, x2: 58, y2: 58, tx: 58, ty: 56 },
    { x1: 10, y1: 58, x2: 58, y2: 58, tx: 12, ty: 58 },
    { x1: 14, y1: 54, x2: 54, y2: 14, tx: 52, ty: 16 },
  ];

  function dist2(ax, ay, bx, by) { const dx = ax - bx, dy = ay - by; return dx * dx + dy * dy; }

  // Estilo fósforo: palito de madera + cabeza roja
  function dibujarFosforo(m, anim) {
    const clase = anim ? ' class="nuevo-fosforo"' : "";
    return '<g' + clase + '>' +
      '<line x1="' + m.x1 + '" y1="' + m.y1 + '" x2="' + m.x2 + '" y2="' + m.y2 +
      '" stroke="#E9C893" stroke-width="5" stroke-linecap="round"/>' +
      '<circle cx="' + m.tx + '" cy="' + m.ty + '" r="4.4" fill="#C1440E"/></g>';
  }

  // Estilo cigarro armado: filtro crema FINO en la base que se ensancha
  // hacia la punta encendida (brasa). Se dibuja en horizontal y se rota.
  function dibujarCigarro(m, anim) {
    // La punta (brasa) es el extremo más cercano a (tx,ty); el filtro va en el otro.
    const dA = dist2(m.x1, m.y1, m.tx, m.ty);
    const dB = dist2(m.x2, m.y2, m.tx, m.ty);
    const tip = dA < dB ? { x: m.x1, y: m.y1 } : { x: m.x2, y: m.y2 };
    const fil = dA < dB ? { x: m.x2, y: m.y2 } : { x: m.x1, y: m.y1 };
    const L = Math.hypot(tip.x - fil.x, tip.y - fil.y) || 1;
    const ang = (Math.atan2(tip.y - fil.y, tip.x - fil.x) * 180 / Math.PI).toFixed(1);

    const fl = 9;      // largo del filtro (boquilla), parte fina
    const hwF = 2.3;   // semi-ancho fino (en el filtro)
    const hwT = 4.8;   // semi-ancho ancho (en la punta encendida)
    const span = L - fl;
    // Cuerpo verde que va de fino (filtro) a ancho (punta redondeada)
    const cuerpo =
      'M ' + fl + ' ' + (-hwF) +
      ' Q ' + (fl + span * 0.5) + ' ' + (-hwT * 0.92) + ' ' + (L - 1) + ' ' + (-hwT) +
      ' Q ' + L + ' ' + (-hwT) + ' ' + L + ' 0' +
      ' Q ' + L + ' ' + hwT + ' ' + (L - 1) + ' ' + hwT +
      ' Q ' + (fl + span * 0.5) + ' ' + (hwT * 0.92) + ' ' + fl + ' ' + hwF + ' Z';
    const vena1 = 'M ' + (fl + 3) + ' ' + (-hwF * 0.3) + ' Q ' + (fl + span * 0.5) + ' ' + (-hwT * 0.4) + ' ' + (L - 5) + ' ' + (-hwT * 0.45);
    const vena2 = 'M ' + (fl + 4) + ' ' + (hwF * 0.3) + ' Q ' + (fl + span * 0.55) + ' ' + (hwT * 0.4) + ' ' + (L - 6) + ' ' + (hwT * 0.4);

    const inner =
      // filtro crema fino
      '<rect x="-0.5" y="' + (-hwF) + '" width="' + (fl + 1.5) + '" height="' + (hwF * 2) + '" rx="1.4" fill="#EAE3C6" stroke="#C7BB8C" stroke-width="0.8"/>' +
      // cuerpo verde ensanchándose con contorno
      '<path d="' + cuerpo + '" fill="#8CA95C" stroke="#5C7B38" stroke-width="1.5" stroke-linejoin="round"/>' +
      // venas suaves
      '<path d="' + vena1 + '" stroke="#6B8C43" stroke-width="0.8" fill="none" stroke-linecap="round" opacity="0.7"/>' +
      '<path d="' + vena2 + '" stroke="#6B8C43" stroke-width="0.8" fill="none" stroke-linecap="round" opacity="0.55"/>' +
      // brasa encendida en la punta ancha
      '<circle cx="' + (L - 1.5) + '" cy="0" r="' + (hwT * 0.95).toFixed(2) + '" fill="#E85D1A" opacity="0.4"/>' +
      '<circle cx="' + (L - 1.5) + '" cy="0" r="' + (hwT * 0.58).toFixed(2) + '" fill="#D43A0A"/>' +
      '<circle cx="' + (L - 1.5) + '" cy="0" r="' + (hwT * 0.3).toFixed(2) + '" fill="#FF9A2E"/>';

    // La animación de aparición va en un grupo INTERNO para no pisar
    // el transform de posición del grupo externo (ese era el bug al sumar).
    const contenido = anim
      ? '<g class="nuevo-fosforo" style="transform-box:fill-box;transform-origin:center">' + inner + '</g>'
      : inner;
    return '<g transform="translate(' + fil.x + ' ' + fil.y + ') rotate(' + ang + ')">' + contenido + '</g>';
  }

  const ESTILOS = {
    fosforos: dibujarFosforo,
    cigarro: dibujarCigarro,
  };
  // Orden en que cicla el botón (sumá nuevas claves acá para habilitarlas)
  const ICONOS = ["fosforos", "cigarro"];

  function svgCuadro(cantidad, animarUltimo, estilo) {
    const dibujar = ESTILOS[estilo] || ESTILOS.fosforos;
    let s = '<svg viewBox="0 0 68 68">';
    for (let i = 0; i < cantidad; i++) {
      s += dibujar(POSICIONES[i], animarUltimo && i === cantidad - 1);
    }
    return s + "</svg>";
  }

  // Mini muestra para el botón del header (un solo marcador en diagonal)
  function svgIconoPreview(estilo) {
    const dibujar = ESTILOS[estilo] || ESTILOS.fosforos;
    return '<svg viewBox="0 0 68 68" width="24" height="24" style="display:block">' +
      dibujar(POSICIONES[4], false) + '</svg>';
  }

  // ---- Render ----
  let equipoAnimado = null;

  function render() {
    for (let e = 0; e < 2; e++) {
      const total = estado.puntos[e];
      document.getElementById("puntaje" + e).textContent = total;

      // El juego es a 30, pero los fosforitos se dibujan de a 15.
      // Malas: 0 a 15. Buenas: 16 a 30, dibujadas de nuevo desde 1.
      const enBuenas = total > 15;
      const visibles = enBuenas ? total - 15 : total; // 0..15 que se muestran

      const faseEl = document.getElementById("fase" + e);
      faseEl.textContent = enBuenas ? "buenas" : "malas";
      faseEl.classList.toggle("buenas", enBuenas);

      const cont = document.getElementById("cuadros" + e);
      let html = "";
      for (let g = 0; g < 3; g++) { // siempre 3 cuadros = 15 fosforitos
        const cant = Math.max(0, Math.min(5, visibles - g * 5));
        const esUltimoGrupo = (cant > 0 && cant < 5) || (cant === 5 && visibles === (g + 1) * 5);
        html += '<div class="cuadro">' + svgCuadro(cant, equipoAnimado === e && esUltimoGrupo, estado.icono) + "</div>";
      }
      cont.innerHTML = html;

      document.getElementById("mas" + e).disabled = total >= 30 || hayGanador();
      document.getElementById("menos" + e).disabled = total === 0;
    }

    document.getElementById("deshacer").disabled = estado.historial.length === 0;

    const g = ganador();
    const velo = document.getElementById("velo");
    if (g !== null) {
      document.getElementById("tituloGanador").textContent = "¡Ganó " + estado.nombres[g] + "!";
      document.getElementById("marcadorFinal").textContent = estado.puntos[0] + " — " + estado.puntos[1];
      velo.classList.remove("oculto");
    } else {
      velo.classList.add("oculto");
    }
    equipoAnimado = null;
    guardar();
  }

  function ganador() {
    if (estado.puntos[0] >= 30) return 0;
    if (estado.puntos[1] >= 30) return 1;
    return null;
  }
  function hayGanador() { return ganador() !== null; }

  // ---- Acciones ----
  function cambiar(equipo, delta) {
    estado.historial.push(estado.puntos.slice());
    if (estado.historial.length > 60) estado.historial.shift();
    estado.puntos[equipo] = Math.max(0, Math.min(30, estado.puntos[equipo] + delta));
    equipoAnimado = delta > 0 ? equipo : null;
    if (delta > 0) {
      if (navigator.vibrate) navigator.vibrate(15);
      sonarPunto();
    }
    render();
  }

  function deshacer() {
    if (estado.historial.length === 0) return;
    estado.puntos = estado.historial.pop();
    render();
  }

  function nuevaPartida() {
    estado.puntos = [0, 0];
    estado.historial = [];
    render();
  }

  // ---- Eventos ----
  document.getElementById("mas0").addEventListener("click", () => cambiar(0, 1));
  document.getElementById("menos0").addEventListener("click", () => cambiar(0, -1));
  document.getElementById("mas1").addEventListener("click", () => cambiar(1, 1));
  document.getElementById("menos1").addEventListener("click", () => cambiar(1, -1));
  document.getElementById("deshacer").addEventListener("click", deshacer);
  document.getElementById("nueva").addEventListener("click", nuevaPartida);
  document.getElementById("corregir").addEventListener("click", deshacer);
  document.getElementById("otra").addEventListener("click", nuevaPartida);

  // ---- Selector de icono (estilo de los puntos) ----
  if (ICONOS.indexOf(estado.icono) === -1) estado.icono = "fosforos";
  const btnIcono = document.getElementById("btn-icono");
  function pintarBotonIcono() { btnIcono.innerHTML = svgIconoPreview(estado.icono); }
  btnIcono.addEventListener("click", () => {
    const i = ICONOS.indexOf(estado.icono);
    estado.icono = ICONOS[(i + 1) % ICONOS.length];
    pintarBotonIcono();
    render();
    guardar();
  });
  pintarBotonIcono();

  for (let e = 0; e < 2; e++) {
    const input = document.getElementById("nombre" + e);
    input.value = estado.nombres[e];
    input.addEventListener("input", () => {
      estado.nombres[e] = input.value || (e === 0 ? "Nosotros" : "Ellos");
      guardar();
    });
  }

  render();

  // ---- Service worker (offline) ----
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("sw.js").catch(() => { /* sin offline */ });
    });
  }
})();
</script>
</body>
</html>
